openapi: 3.0.3
info:
  title: Insect Types API Contract
  version: 1.0.0
  description: Contract for read-only insect type catalog endpoints.
paths:
  /api/tipos-insecto:
    get:
      summary: List active insect types
      operationId: obtenerTiposInsecto
      responses:
        '200':
          description: Active insect types retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTipoInsectoList'
  /api/tipos-insecto/{id}:
    get:
      summary: Get active insect type by id
      operationId: obtenerTipoInsectoPorId
      parameters:
        - name: id
          in: path
          required: true
          description: Insect type unique identifier
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Insect type retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTipoInsectoItem'
        '400':
          description: Invalid identifier format or range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Insect type not found or inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
components:
  schemas:
    TipoInsectoResponseDTO:
      type: object
      required:
        - id
        - nombre
        - active
      properties:
        id:
          type: integer
          format: int64
        nombre:
          type: string
        descripcion:
          type: string
          nullable: true
        active:
          type: boolean
    ApiResponseTipoInsectoItem:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/TipoInsectoResponseDTO'
    ApiResponseTipoInsectoList:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/TipoInsectoResponseDTO'
    ApiErrorResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errorCode:
          type: string
